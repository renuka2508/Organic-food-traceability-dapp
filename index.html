
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organic Food Traceability</title>
    <link rel="stylesheet" href="style.css">
    <!-- Load Web3.js from CDN (Crucial for GitHub Pages) -->
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <!-- Load QR Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

    <div class="container">
        <header>
            <h1>🌿 Organic Traceability</h1>
            <div class="wallet-section">
                <button id="walletBtn" onclick="connectWallet()">Connect MetaMask</button>
                <p id="roleStatus">Mode: Waiting for connection...</p>
            </div>
        </header>

        <hr>

        <!-- AGENT/ADMIN DASHBOARD (Hidden by default) -->
        <div id="agentDash" class="hidden">
            <section class="card admin-card">
                <h2>🛠️ Agent Dashboard</h2>
                
                <div class="form-group">
                    <h3>Register New Product</h3>
                    <input type="text" id="name" placeholder="Product Name (e.g. Organic Honey)">
                    <input type="text" id="origin" placeholder="Farm Location">
                    <input type="text" id="metadata" placeholder="Certificates/IPFS Hash (Optional)">
                    <button onclick="addProduct()">Add Product to Blockchain</button>
                </div>

                <div class="form-group">
                    <h3>Update Tracking Status</h3>
                    <input type="number" id="updateId" placeholder="Enter Product ID">
                    <select id="status">
                        <option value="Harvested">Harvested</option>
                        <option value="In Processing">In Processing</option>
                        <option value="Quality Checked">Quality Checked</option>
                        <option value="In Transit">In Transit</option>
                        <option value="Delivered to Retail">Delivered to Retail</option>
                    </select>
                    <button onclick="addTracking()" class="secondary-btn">Update Status</button>
                </div>

                <!-- Admin Only: Authorize others -->
                <div class="form-group" style="border-top: 1px solid #ddd; padding-top: 10px;">
                    <button onclick="authorizeNewAgent()" style="background: #fbbf24; color: black;">+ Authorize New Agent Address</button>
                </div>
            </section>
        </div>

        <!-- PUBLIC VIEW (Always visible) -->
        <section class="card">
            <h2>🔍 Trace Product</h2>
            <div id="qr-reader" style="width: 100%;"></div>
            <div class="search-box">
                <input type="number" id="viewId" placeholder="Enter Product ID to Search">
                <button onclick="getHistory()">View History</button>
            </div>

            <div id="timelineContainer" class="timeline">
                <!-- Tracking steps will appear here -->
                <p class="placeholder-text">Enter an ID or scan a QR code to see the journey.</p>
            </div>
        </section>
    </div>

    <!-- Load your custom logic -->
    <script src="app.js"></script>
</body>
</html>
