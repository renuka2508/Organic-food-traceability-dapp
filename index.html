<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EcoTrack | Blockchain Traceability</title>
    <!-- LIBRARIES -->
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

    <h1>🌿 EcoTrack</h1>
    <button id="walletBtn" onclick="connectWallet()">Connect MetaMask</button>
    <p id="roleStatus">Status: Waiting...</p>

    <hr>

    <!-- AGENT SECTION -->
    <div id="agentDash">
        <h2>🛠️ Agent Dashboard</h2>
        <div>
            <h3>Register Product</h3>
            <input type="text" id="name" placeholder="Product Name">
            <input type="text" id="origin" placeholder="Origin/Farm">
            <button id="regBtn" onclick="addProduct()">Register</button>
        </div>

        <div>
            <h3>Update Status</h3>
            <input type="number" id="id" placeholder="Product ID">
            <input type="text" id="status" placeholder="Status (e.g. Shipped)">
            <button onclick="addTracking()">Update Tracking</button>
        </div>

        <div id="qr-result" style="display:none; border: 1px solid #ccc; padding: 10px; margin-top: 10px;">
            <p>QR for Product ID: <span id="displayID"></span></p>
            <div id="qrcode"></div>
        </div>
    </div>

    <hr>

    <!-- PUBLIC SECTION -->
    <div id="customerDash">
        <h2>🔍 Trace Product</h2>
        <div id="qr-reader" style="width: 300px;"></div>
        <input type="number" id="viewId" placeholder="Enter Product ID">
        <button onclick="getHistory()">Track Journey</button>
        <div id="timelineContainer"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
